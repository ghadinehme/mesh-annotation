<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GLB Labeler</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #eee; height: 100vh; overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* Top bar */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 24px; background: #16213e; border-bottom: 1px solid #0f3460;
    flex-shrink: 0;
  }
  .topbar .title { font-size: 18px; font-weight: 600; }
  .topbar .counter { font-size: 14px; color: #999; }
  .topbar .label-badge {
    font-size: 16px; font-weight: 700; padding: 6px 18px;
    border-radius: 8px; min-width: 120px; text-align: center;
  }
  .label-badge.approved { background: #0f5132; color: #75b798; }
  .label-badge.discarded { background: #660033; color: #ea868f; }
  .label-badge.none { background: #333; color: #888; }

  /* Viewer */
  .viewer-container {
    flex: 1; position: relative; display: flex;
    align-items: center; justify-content: center;
  }
  #viewer {
    width: 100%; height: 100%;
  }
  .filename {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 8px;
    font-size: 14px; color: #ccc;
  }

  /* Nav arrows */
  .nav-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; font-size: 28px; width: 48px; height: 48px;
    border-radius: 50%; cursor: pointer; display: flex;
    align-items: center; justify-content: center; transition: background 0.2s;
    z-index: 10;
  }
  .nav-arrow:hover { background: rgba(255,255,255,0.18); }
  .nav-arrow.left { left: 16px; }
  .nav-arrow.right { right: 16px; }

  /* Bottom bar */
  .bottombar {
    display: flex; align-items: center; justify-content: center;
    gap: 24px; padding: 14px 24px; background: #16213e;
    border-top: 1px solid #0f3460; flex-shrink: 0;
  }
  .btn {
    padding: 10px 28px; border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  .btn-approve { background: #198754; color: #fff; }
  .btn-approve:hover { background: #157347; }
  .btn-discard { background: #dc3545; color: #fff; }
  .btn-discard:hover { background: #bb2d3b; }
  .btn-save { background: #0d6efd; color: #fff; }
  .btn-save:hover { background: #0b5ed7; }

  .hint { font-size: 12px; color: #666; }
  .progress-bar {
    height: 3px; background: #0f3460; width: 100%;
  }
  .progress-bar .fill {
    height: 100%; background: #0d6efd; transition: width 0.3s;
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: #198754; color: #fff; padding: 10px 24px; border-radius: 8px;
    font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="progress-bar"><div class="fill" id="progressFill"></div></div>

<div class="topbar">
  <div>
    <div class="title">GLB Labeler</div>
    <div class="counter" id="counter">Loading...</div>
  </div>
  <div class="label-badge none" id="labelBadge">-</div>
</div>

<div class="viewer-container">
  <button class="nav-arrow left" onclick="navigate(-1)">&#8592;</button>
  <div id="viewer"></div>
  <button class="nav-arrow right" onclick="navigate(1)">&#8594;</button>
  <div class="filename" id="filename"></div>
</div>

<div class="bottombar">
  <button class="btn btn-approve" onclick="label(1)">&#10003; Approve (A)</button>
  <button class="btn btn-discard" onclick="label(0)">&#10007; Discard (D)</button>
  <button class="btn btn-save" onclick="saveLabels()">&#128190; Save CSV (S)</button>
  <span class="hint">&#8592;/&#8594; navigate &nbsp;|&nbsp; A approve &nbsp;|&nbsp; D discard &nbsp;|&nbsp; S save</span>
</div>

<div class="toast" id="toast"></div>

<!-- Three.js + GLTFLoader + OrbitControls via CDN -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

let glbs = [];
let labels = {};
let currentIdx = 0;
let scene, camera, renderer, controls, loader;
let currentModel = null;

// ── Init Three.js ──────────────────────────────────
function initThree() {
  const container = document.getElementById('viewer');
  const w = container.clientWidth, h = container.clientHeight;

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);

  camera = new THREE.PerspectiveCamera(50, w / h, 0.01, 100);
  camera.position.set(0, 1.2, 2.5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;

  // Lighting
  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  scene.add(ambient);
  const dir1 = new THREE.DirectionalLight(0xffffff, 1.2);
  dir1.position.set(5, 10, 7);
  scene.add(dir1);
  const dir2 = new THREE.DirectionalLight(0xffffff, 0.4);
  dir2.position.set(-5, 5, -5);
  scene.add(dir2);

  loader = new GLTFLoader();

  window.addEventListener('resize', () => {
    const w2 = container.clientWidth, h2 = container.clientHeight;
    camera.aspect = w2 / h2;
    camera.updateProjectionMatrix();
    renderer.setSize(w2, h2);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
}

// ── Load model ─────────────────────────────────────
function loadModel(filename) {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
    });
    currentModel = null;
  }

  loader.load(`/glbs/${filename}`, (gltf) => {
    currentModel = gltf.scene;

    // Center and scale
    const box = new THREE.Box3().setFromObject(currentModel);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scale = 1.5 / maxDim;
    currentModel.scale.setScalar(scale);
    currentModel.position.sub(center.multiplyScalar(scale));

    scene.add(currentModel);

    // Reset camera
    camera.position.set(0, 1.2, 2.5);
    controls.target.set(0, 0, 0);
    controls.update();
  });
}

// ── UI updates ─────────────────────────────────────
function updateUI() {
  const name = glbs[currentIdx];
  const id = name.replace('.glb', '');
  document.getElementById('filename').textContent = name;
  document.getElementById('counter').textContent =
    `${currentIdx + 1} / ${glbs.length}  •  ${Object.keys(labels).length} labeled`;

  const badge = document.getElementById('labelBadge');
  if (labels[id] === 1) {
    badge.textContent = 'Approved'; badge.className = 'label-badge approved';
  } else if (labels[id] === 0) {
    badge.textContent = 'Discarded'; badge.className = 'label-badge discarded';
  } else {
    badge.textContent = '-'; badge.className = 'label-badge none';
  }

  const pct = glbs.length > 0 ? (Object.keys(labels).length / glbs.length) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
}

// ── Actions ────────────────────────────────────────
window.navigate = function(dir) {
  const next = currentIdx + dir;
  if (next < 0 || next >= glbs.length) return;
  currentIdx = next;
  loadModel(glbs[currentIdx]);
  updateUI();
};

window.label = function(val) {
  const id = glbs[currentIdx].replace('.glb', '');
  labels[id] = val;
  updateUI();
  showToast(val === 1 ? '✓ Approved' : '✗ Discarded');
  // Auto-advance if not at end
  if (currentIdx < glbs.length - 1) {
    setTimeout(() => window.navigate(1), 250);
  }
};

window.saveLabels = async function() {
  const resp = await fetch('/api/labels', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(labels),
  });
  if (resp.ok) {
    showToast(`Saved ${Object.keys(labels).length} labels to labels.csv`);
  } else {
    showToast('Error saving!');
  }
};

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

// ── Keyboard ───────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') window.navigate(-1);
  else if (e.key === 'ArrowRight') window.navigate(1);
  else if (e.key === 'a' || e.key === 'A') window.label(1);
  else if (e.key === 'd' || e.key === 'D') window.label(0);
  else if (e.key === 's' || e.key === 'S') window.saveLabels();
});

// ── Boot ───────────────────────────────────────────
async function init() {
  initThree();
  const [glbResp, labelResp] = await Promise.all([
    fetch('/api/glbs').then(r => r.json()),
    fetch('/api/labels').then(r => r.json()),
  ]);
  glbs = glbResp;
  labels = labelResp;
  if (glbs.length > 0) {
    loadModel(glbs[0]);
  }
  updateUI();
}

init();
</script>
</body>
</html>
